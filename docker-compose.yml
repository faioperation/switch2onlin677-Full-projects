services:

  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL 17 with pgvector extension
  # Required by: AI service (product embeddings, knowledge chunks)
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: switch2online_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-simple_test_db}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis 7 — Cache + session store
  # Required by: AI service (product list cache, handoff state cache)
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: switch2online_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-admin123} --save 60 1000 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-admin123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─────────────────────────────────────────────────────────────────────────────
  # AI Service — FastAPI + Gunicorn + pgvector + OpenAI
  # Business logic: chat, recommendations, SAP sync, embeddings, RAG
  # ─────────────────────────────────────────────────────────────────────────────
  ai:
    build:
      context: ./AI
      dockerfile: Dockerfile
    container_name: switch2online_ai
    restart: unless-stopped
    env_file:
      - ./AI/.env
    expose:
      - "8000"
    volumes:
      - ./AI/knowledge_base:/app/knowledge_base
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend — Django 6 REST API + JWT + Meta Webhooks + AI Proxy
  # Auth, conversation history, webhook handling, admin dashboard proxy
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: switch2online_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-8010}:8000"
    volumes:
      - backend_sqlite:/app/data
      - backend_media:/app/media
    depends_on:
      ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend — React 19 + Vite + Tailwind 4 served by nginx
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://test1.fireai.agency/api}
    container_name: switch2online_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8003}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

# ─────────────────────────────────────────────────────────────────────────────
# Named Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  # Shared external PostgreSQL volume (pre-created with: docker volume create ai_postgres_data)
  postgres_data:
    external: true
    name: ai_postgres_data
  redis_data:
  backend_sqlite:
  backend_media:

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
