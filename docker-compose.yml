services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: switch2online_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: simple_test_db
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: switch2online_redis
    restart: unless-stopped
    command: redis-server --requirepass admin123
    volumes:
      - redis_data:/data

  ai:
    build:
      context: ./AI
    container_name: switch2online_ai
    restart: unless-stopped
    env_file:
      - ./AI/.env
    expose:
      - "8000"
    volumes:
      - ./AI/knowledge_base:/app/knowledge_base
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  backend:
    build:
      context: ./backend
    container_name: switch2online_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8002:8000"
    volumes:
      - backend_sqlite:/app/data
      - backend_media:/app/media
    depends_on:
      - ai

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://test1.fireai.agency/api
    container_name: switch2online_frontend
    restart: unless-stopped
    ports:
      - "8003:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    external: true
    name: ai_postgres_data
  redis_data:
  backend_sqlite:
  backend_media:
