[alembic]
# Path to the alembic directory (relative to this file's location)
script_location = alembic

# Migration file naming: YYYYMMDD_<revid>_<slug>.py
# Example: 20260517_b4f3a1d2e891_add_gender_to_products.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Ensure the project root is on sys.path so env.py can import database.py / models.py
prepend_sys_path = .

# Timezone for "Create Date" header in generated migration files
timezone = UTC

# sqlalchemy.url is intentionally left empty.
# env.py reads DATABASE_URL from the .env file and sets it programmatically.
# Never hardcode credentials here.
sqlalchemy.url =

# Alembic will truncate the "slug" (description) in the filename to this length
truncate_slug_length = 40

# Do NOT use --autogenerate for GIN / trigram indexes — Alembic cannot detect them.
# Always write those manually with op.execute() in the migration file.


# ── Logging ──────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
