services:

  postgres:
    image: pgvector/pgvector:pg17
    container_name: switch2online_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-simple_test_db}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: switch2online_redis_prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1000
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ai:
    build:
      context: ./AI
      dockerfile: Dockerfile.prod
    container_name: switch2online_ai_prod
    restart: always
    env_file:
      - ./AI/.env
    expose:
      - "8000"
    volumes:
      - ./AI/knowledge_base:/app/knowledge_base
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1g
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: switch2online_backend_prod
    restart: always
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    volumes:
      - backend_sqlite:/app/data
      - backend_media:/app/media
    depends_on:
      ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: switch2online_frontend_prod
    restart: always
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - proxy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx reverse proxy — terminates SSL, routes traffic to backend/frontend
  nginx:
    image: nginx:1.27-alpine
    container_name: switch2online_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - backend_media:/app/media:ro
    depends_on:
      - frontend
      - backend
    networks:
      - proxy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    external: true
    name: ai_postgres_data
  redis_data:
  backend_sqlite:
  backend_media:

networks:
  internal:
    driver: bridge
    internal: true
  proxy:
    driver: bridge
